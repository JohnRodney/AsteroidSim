<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asteroid Belt Simulator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #000;
        color: #fff;
        overflow: hidden;
      }

      #renderCanvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .loading-spinner {
        border: 4px solid #333;
        border-top: 4px solid #fff;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      #ui-overlay {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
        pointer-events: none;
      }

      #ui-overlay > * {
        pointer-events: auto;
      }

      .control-panel {
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid #333;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 15px;
        min-width: 250px;
      }

      .control-panel h3 {
        margin: 0 0 10px 0;
        color: #fff;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .control-group {
        margin-bottom: 10px;
      }

      .control-group label {
        display: block;
        margin-bottom: 5px;
        font-size: 12px;
        color: #ccc;
      }

      .control-group input[type="range"] {
        width: 100%;
        margin: 5px 0;
      }

      .control-group button {
        background: #333;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        margin-right: 5px;
        margin-bottom: 5px;
      }

      .control-group button:hover {
        background: #555;
      }

      .control-group button.primary {
        background: #007acc;
      }

      .control-group button.primary:hover {
        background: #005a9e;
      }

      .control-group button.danger {
        background: #d32f2f;
      }

      .control-group button.danger:hover {
        background: #b71c1c;
      }

      .stats-panel {
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid #333;
        border-radius: 8px;
        padding: 15px;
        min-width: 200px;
      }

      .stats-panel h3 {
        margin: 0 0 10px 0;
        color: #fff;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .stat-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 5px;
        font-size: 12px;
      }

      .stat-label {
        color: #ccc;
      }

      .stat-value {
        color: #fff;
        font-weight: bold;
      }

      #error-message {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(211, 47, 47, 0.9);
        color: white;
        padding: 20px;
        border-radius: 8px;
        z-index: 1001;
        display: none;
        max-width: 400px;
        text-align: center;
      }

      .status-indicator {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 5px;
      }

      .status-connected {
        background: #4caf50;
      }

      .status-disconnected {
        background: #f44336;
      }

      .status-connecting {
        background: #ff9800;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>

    <div id="loading-screen">
      <div class="loading-spinner"></div>
      <div id="loading-text">Initializing 3D scene...</div>
    </div>

    <div id="error-message"></div>

    <div id="ui-overlay">
      <div class="control-panel">
        <h3>Simulation Controls</h3>

        <div class="control-group">
          <label for="timeSpeed"
            >Time Speed: <span id="speedValue">1x</span></label
          >
          <input
            type="range"
            id="timeSpeed"
            min="0"
            max="30"
            step="0.1"
            value="1"
          />
        </div>

        <div class="control-group">
          <button id="pauseBtn">Pause</button>
          <button id="resetBtn">Reset Camera</button>
          <button id="syncBtn" class="primary">Sync Data</button>
        </div>

        <div class="control-group">
          <div class="stat-item">
            <span class="stat-label">Connection:</span>
            <span class="stat-value">
              <span
                class="status-indicator status-disconnected"
                id="connectionStatus"
              ></span>
              <span id="connectionText">Disconnected</span>
            </span>
          </div>
        </div>
      </div>

      <div class="stats-panel">
        <h3>Statistics</h3>
        <div class="stat-item">
          <span class="stat-label">Simulation Date:</span>
          <span class="stat-value" id="simulation-date">Loading...</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Asteroids:</span>
          <span class="stat-value" id="asteroid-count">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Planets:</span>
          <span class="stat-value" id="planet-count">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Total Mass:</span>
          <span class="stat-value" id="total-mass">0 kg</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">FPS:</span>
          <span class="stat-value" id="fps">0</span>
        </div>
        <div
          class="stat-item"
          style="margin-top: 10px; font-size: 10px; color: #888"
        >
          <span
            >💡 Click on any asteroid or planet to view details & focus
            camera</span
          >
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
