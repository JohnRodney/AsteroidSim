<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asteroid Belt Simulator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Arial", sans-serif;
        background: #000;
        color: #fff;
        overflow: hidden;
      }

      #renderCanvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      #ui-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }

      #ui-overlay > * {
        pointer-events: auto;
      }

      .info-panel {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid #333;
        border-radius: 8px;
        padding: 15px;
        min-width: 250px;
      }

      .controls-panel {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid #333;
        border-radius: 8px;
        padding: 15px;
      }

      .loading-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
      }

      .loading-screen.hidden {
        display: none;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid #333;
        border-top: 3px solid #fff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>

    <div id="ui-overlay">
      <div class="info-panel">
        <h3>Asteroid Belt Simulator</h3>
        <p>Total Asteroids: <span id="asteroid-count">0</span></p>
        <p>Total Mass: <span id="total-mass">0</span> kg</p>
        <p>FPS: <span id="fps">0</span></p>
      </div>

      <div class="controls-panel">
        <button id="play-pause">Pause</button>
        <button id="reset-view">Reset View</button>
        <div>
          <label for="time-speed">Time Speed:</label>
          <input
            type="range"
            id="time-speed"
            min="0.1"
            max="10"
            step="0.1"
            value="1"
          />
          <span id="speed-value">1x</span>
        </div>
      </div>
    </div>

    <div id="loading-screen" class="loading-screen">
      <div class="spinner"></div>
      <h2>Loading Asteroid Belt Simulator...</h2>
      <p>Initializing 3D scene and loading asteroid data</p>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
